<!DOCTYPE html>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:#303133;background:#f6f8fb;font-size:14px}.app{width:100vw;min-height:100vh;background:#f6f8fb}.topbar{height:58px;background:#fff;border-bottom:1px solid #ebeef4;display:flex;align-items:center}.brand{width:192px;height:58px;display:flex;align-items:center;justify-content:center;color:#303133;background:#fff;font-size:18px;font-weight:600;letter-spacing:.5px;border-right:1px solid #ebeef4}.tabs{display:flex;height:58px;align-items:center}.tab{height:58px;display:flex;align-items:center;padding:0 26px;border-right:1px solid #ebeef4;color:#606266;background:#fff}.tab.active{color:#a86115;background:#fcebd8}.tenant{display:flex;align-items:center;gap:6px;padding:0 28px;color:#606266}.user{margin-left:auto;display:flex;align-items:center;gap:26px;padding-right:28px;color:#606266}.shell{display:flex;min-height:calc(100vh - 58px)}.sidebar{width:192px;background:#fff;color:#606266;padding-top:18px;border-right:1px solid #ebeef4}.nav-item{height:50px;display:flex;align-items:center;gap:10px;padding:0 18px;color:#606266;background:#fff}.nav-item .icon{width:18px;opacity:.9;text-align:center}.nav-item.child{padding-left:30px}.nav-item.child.active{background:#fcebd8;color:#a86115}.content{flex:1;padding:22px 26px;overflow:auto;background:#fff}.crumb{color:#606266;font-size:14px;margin:4px 0 16px}.rule-card{background:#fff;border:1px solid #ebeef4;border-radius:3px;padding:14px 16px;margin-bottom:14px;display:grid;grid-template-columns:1.2fr 1.8fr .8fr .9fr;gap:12px;color:#606266}.rule-card b{display:block;color:#303133;margin-bottom:4px}.toolbar{height:42px;display:flex;align-items:center;margin-bottom:12px}.toolbar-actions{margin-left:auto;display:flex;gap:12px}.btn{height:32px;padding:0 15px;border-radius:3px;border:1px solid #dcdfe6;background:#fff;color:#606266;display:inline-flex;align-items:center;justify-content:center;gap:5px;line-height:30px;cursor:pointer}.btn.primary{background:#a86115;border-color:#a86115;color:#fff}.btn.text{border:0;background:transparent;color:#a86115;padding:0 3px;height:auto}.btn.danger{border-color:#f56c6c;color:#f56c6c;background:#fff}.table-card{background:#fff;border:1px solid #ebeef4;overflow:hidden}table{width:100%;border-collapse:collapse;table-layout:fixed}th{height:50px;background:#f2f5f9;color:#606266;font-weight:600;border-bottom:1px solid #ebeef4;text-align:left;padding:0 12px;font-size:14px}td{height:62px;border-bottom:1px solid #ebeef4;padding:0 12px;color:#606266;vertical-align:middle;font-size:14px}tr:hover td{background:#fdf6ef}.checkbox{width:14px;height:14px;border:1px solid #dcdfe6;border-radius:2px;background:#fff;display:inline-block}.checkbox.checked{background:#a86115;border-color:#a86115;position:relative}.checkbox.checked:after{content:"";position:absolute;left:3px;top:1px;width:6px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}.status{display:inline-flex;align-items:center;height:24px;padding:0 8px;border-radius:12px;font-size:12px;border:1px solid #e9e9eb;background:#f4f4f5;color:#606266}.status.wait{background:#ecf5ff;color:#337ecc;border-color:#d9ecff}.status.none{background:#f4f4f5;color:#909399;border-color:#e9e9eb}.status.success{background:#f0f9eb;color:#529b2e;border-color:#e1f3d8}.status.fail{background:#fef0f0;color:#c45656;border-color:#fde2e2}.fail-reason{color:#c45656;line-height:20px}.muted{color:#c0c4cc}.phone{color:#606266}.pager{height:56px;display:flex;align-items:center;gap:10px;padding:0 16px;color:#606266}.page-size,.page-input{height:30px;border:1px solid #dcdfe6;border-radius:3px;background:#fff;display:inline-flex;align-items:center;padding:0 10px}.page-num{min-width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border-radius:3px;color:#606266}.page-num.active{background:#a86115;color:#fff}.drawer{position:fixed;right:24px;top:84px;width:330px;background:#fff;border:1px solid #dcdfe6;box-shadow:0 8px 28px rgba(0,0,0,.12);border-radius:4px;display:none;z-index:20}.drawer.show{display:block}.drawer-head{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid #ebeef5;font-weight:600}.drawer-body{padding:16px}.form-row{margin-bottom:14px}.label{color:#606266;margin-bottom:6px;font-size:13px}.input{height:34px;border:1px solid #dcdfe6;border-radius:3px;display:flex;align-items:center;padding:0 10px;color:#909399;background:#fff}.focus-user-status .topbar,.focus-user-status .sidebar,.focus-user-status .rule-card,.focus-user-status .pager{opacity:.4}.focus-user-status th:not(.focus-cell),.focus-user-status td:not(.focus-cell){opacity:.35}.focus-cell{background:#fff8ef!important}.focus-start{box-shadow:inset 2px 2px 0 rgba(168,97,21,.34), inset 0 -2px 0 rgba(168,97,21,.34)}.focus-end{box-shadow:inset -2px 2px 0 rgba(168,97,21,.34), inset 0 -2px 0 rgba(168,97,21,.34)}td.focus-start{box-shadow:inset 2px 0 0 rgba(168,97,21,.34)}td.focus-end{box-shadow:inset -2px 0 0 rgba(168,97,21,.34)}tbody tr:last-child td.focus-start{box-shadow:inset 2px 0 0 rgba(168,97,21,.34), inset 0 -2px 0 rgba(168,97,21,.34)}tbody tr:last-child td.focus-end{box-shadow:inset -2px 0 0 rgba(168,97,21,.34), inset 0 -2px 0 rgba(168,97,21,.34)}@media(max-width:1300px){.brand,.sidebar{width:178px}.tab{padding:0 18px}.content{padding:18px}th,td{padding:0 8px;font-size:13px}.rule-card{grid-template-columns:1fr 1fr}}

</head>
<body>
<div class="app">
  <div class="topbar"><div class="brand">消费者业务中台</div><div class="tabs"><div class="tab">平台端</div><div class="tab active">租户端</div></div><div class="tenant">索菲亚会员小程序</div><div class="user"><span>陈嘉豪，你好！</span><span>退出登录</span></div></div>
  <div class="shell">

    <main class="content">
      <div class="crumb">用户管理 / 分群用户列表</div>
      <div class="toolbar"><div class="toolbar-actions"><button class="btn" onclick="toggleDrawer()">筛选</button><button class="btn primary">批量重试</button></div></div>
      <div class="table-card"><table><colgroup><col style="width:120px"><col style="width:180px"><col style="width:330px"><col style="width:140px"><col style="width:400px"></colgroup><thead><tr><th>分群规则ID</th><th>分群规则编码</th><th>用户UnionID</th><th class="focus-cell focus-start">企微打标状态</th><th class="focus-cell focus-end">打标失败原因</th></tr></thead><tbody id="tbody"></tbody></table><div class="pager"><span>共173条</span><span class="page-size">10条/页⌄</span><span class="page-num">‹</span><span class="page-num active">1</span><span class="page-num">2</span><span class="page-num">3</span><span class="page-num">4</span><span class="page-num">5</span><span class="page-num">›</span><span>前往</span><span class="page-input">1</span><span>页</span></div></div>
    </main>
  </div>
</div>
<div id="drawer" class="drawer"><div class="drawer-head"><span>筛选</span><button class="btn text" onclick="toggleDrawer()">关闭</button></div><div class="drawer-body"><div class="form-row"><div class="label">分群规则ID</div><div class="input">请输入分群规则ID</div></div><div class="form-row"><div class="label">分群规则编码</div><div class="input">请输入分群规则编码</div></div><div class="form-row"><div class="label">用户UnionID</div><div class="input">请输入用户UnionID</div></div><div class="form-row"><div class="label">企微打标状态</div><div class="input">请选择</div></div><div class="flex gap-2 mt-4"><button class="btn primary">查询</button><button class="btn">重置</button></div></div></div>
<script>
const rows=[['57','GR202605180001','oyEgSw-BzOATxNbwaftM6qx8GQqo','无需打标','不存在正常状态的客户记录'],['57','GR202605180001','oyEgSw-CV_FwhXHsWB1q8Eq6uRZS','打标失败','显示接口调用失败原因'],['57','GR202605180001','oyEgSw-IE9FN-mZ_mnZQN-Y3H010','待打标','-'],['57','GR202605180001','oyEgSw-i3o5vLmXQif-r-FLZVU7K','打标成功','-'],['57','GR202605180001','oyEgSw-urPiMpOLx5Hk9XIlyO26yl','打标失败','显示接口调用失败原因'],['57','GR202605180001','oyEgSwOD28qsgh5R5siFXboXgA1A','待打标','-'],['57','GR202605180001','oyEgSWOS_fZew1kk9Ks9i2gcp70M','打标成功','-'],['57','GR202605180001','oyEgSw1eUxInfgXFqS-PKWK58UKE','打标成功','-'],['57','GR202605180001','oyEgSw1igK26zAONgKUh6o_sSv2s','打标成功','-']];
const cls={'待打标':'wait','无需打标':'none','打标成功':'success','打标失败':'fail'};
document.getElementById('tbody').innerHTML=rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td class="focus-cell focus-start"><span class="status ${cls[r[3]]}">${r[3]}</span></td><td class="focus-cell focus-end">${r[4]==='-'?'<span class="muted">-</span>':`<span class="fail-reason">${r[4]}</span>`}</td></tr>`).join('');
function toggleDrawer(){document.getElementById('drawer').classList.toggle('show')}
const params=new URLSearchParams(location.search);const focus=params.get('focus');const autoScrollFocus=params.get('autoscroll')==='1';if(focus==='tag_status'){document.body.classList.add('focus-user-status');if(autoScrollFocus)requestAnimationFrame(()=>document.querySelector('.table-card')?.scrollIntoView({block:'center'}));}
</script>
</body>
